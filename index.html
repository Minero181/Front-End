<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BotCraft — Painel Central</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f0e;--bg2:#131614;--bg3:#1a1d1b;
  --border:#2c312d;--green:#39ff6a;--green2:#22c94a;--green3:#0d5c25;
  --red:#ff3b3b;--yellow:#ffc233;--blue:#33b5ff;
  --text:#e8ede9;--text2:#8a9490;--text3:#536058;
  --sidebar:220px;
}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green);letter-spacing:-1px}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-top:3px}

.nav{padding:14px 10px;flex:1}
.nav-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:4px;color:var(--text2);font-size:11px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:all .15s;margin-bottom:3px;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--green3);color:var(--green);border-left:2px solid var(--green);padding-left:8px}
.nav-item .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .2s}
.nav-item.active .dot,.nav-item:hover .dot{background:var(--green)}
.nav-item .dot.online{background:var(--green);animation:pulse 2s infinite}
.nav-item .dot.offline{background:var(--text3)}
.nav-item .dot.loading{background:var(--yellow);animation:pulse 1s infinite}

@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(57,255,106,.4)}50%{box-shadow:0 0 0 4px rgba(57,255,106,0)}}

.nav-item-info{flex:1;min-width:0}
.nav-item-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-url{font-size:9px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.status-box{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 10px}
.status-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text2);margin-bottom:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.status-hint{font-size:9px;color:var(--text3);margin-top:4px}

/* CONTENT */
.content{flex:1;position:relative;overflow:hidden}
.iframe-container{position:absolute;inset:0;display:none;flex-direction:column}
.iframe-container.active{display:flex}

.iframe-topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:40px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.iframe-topbar-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--text)}
.iframe-topbar-url{font-size:10px;color:var(--text3);flex:1}
.iframe-topbar-actions{display:flex;gap:6px}
.top-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.top-btn:hover{border-color:var(--green);color:var(--green)}
.top-btn.danger:hover{border-color:var(--red);color:var(--red)}

iframe{flex:1;border:none;width:100%;background:var(--bg)}

/* LOADING OVERLAY */
.iframe-loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5}
.iframe-loading.hidden{display:none}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}

/* EDIT URL MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:6px;width:90%;max-width:480px;overflow:hidden}
.modal-hdr{background:var(--bg3);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text)}
.modal-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:18px}
.fgroup{margin-bottom:12px}
.fgroup label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:6px}
.fgroup input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 12px;outline:none}
.fgroup input:focus{border-color:var(--green2)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:7px 14px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn-primary{background:var(--green);color:#000;border-color:var(--green);font-weight:700}
.btn-primary:hover{background:var(--green2);border-color:var(--green2)}

/* EMPTY STATE */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3)}
.empty-icon{font-size:48px;opacity:.2}
.empty-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text2)}
.empty-sub{font-size:11px;letter-spacing:1px;text-align:center;line-height:1.6}

/* MOBILE */
@media(max-width:600px){
  :root{--sidebar:48px}
  .nav-item-info,.logo-sub,.nav-label,.nav-item-url{display:none}
  .logo-mark{font-size:14px}
  .nav-item{justify-content:center;padding:10px}
  .sidebar-footer{display:none}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">BC/</div>
    <div class="logo-sub">Central</div>
  </div>

  <nav class="nav">
    <div class="nav-label">Servidores</div>
    <div id="navItems"></div>

    <div class="nav-label" style="margin-top:12px">Ações</div>
    <button class="nav-item" onclick="openAddModal()">
      <div class="dot" style="background:var(--blue)"></div>
      <div class="nav-item-info">
        <div class="nav-item-name">+ Adicionar</div>
        <div class="nav-item-url">Novo servidor</div>
      </div>
    </button>
  </nav>

  <div class="sidebar-footer">
    <div class="status-box">
      <div class="status-row"><span class="status-dot"></span> Sistema ativo</div>
      <div class="status-hint" id="activeCount">0 servidores</div>
    </div>
  </div>
</aside>

<div class="content" id="contentArea">
  <div class="empty" id="emptyState">
    <div class="empty-icon">⚡</div>
    <div class="empty-title">BotCraft Central</div>
    <div class="empty-sub">Selecione um servidor na barra lateral<br>ou adicione um novo para começar.</div>
  </div>
</div>

<!-- MODAL ADICIONAR/EDITAR -->
<div class="modal" id="editModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <h3 id="modalTitle">Adicionar Servidor</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="fgroup">
        <label>Nome do Servidor</label>
        <input type="text" id="editName" placeholder="Ex: Render 1">
      </div>
      <div class="fgroup">
        <label>URL do Painel</label>
        <input type="text" id="editUrl" placeholder="https://meu-bot.onrender.com">
      </div>
      <div class="modal-footer">
        <button class="btn" id="deleteBtn" onclick="deleteServer()" style="color:var(--red);border-color:rgba(255,59,59,.3);display:none">Remover</button>
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveServer()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_SERVERS = [
  { id: 1, name: 'Render 1', url: 'https://bot2-0-g1bt.onrender.com/' },
  { id: 2, name: 'Render 2', url: 'https://bot2-0-instance2.onrender.com/' },
  { id: 3, name: 'Render 3', url: 'https://seu-render-3.onrender.com' },
];

let servers = [];
let activeId = null;
let editingId = null;
let nextId = 10;

function loadServers() {
  try {
    const saved = localStorage.getItem('bc_servers');
    servers = saved ? JSON.parse(saved) : [...DEFAULT_SERVERS];
    nextId = Math.max(...servers.map(s => s.id), 9) + 1;
  } catch(e) {
    servers = [...DEFAULT_SERVERS];
  }
}

function saveServers() {
  localStorage.setItem('bc_servers', JSON.stringify(servers));
}

function renderNav() {
  const container = document.getElementById('navItems');
  container.innerHTML = servers.map(s => `
    <button class="nav-item ${activeId === s.id ? 'active' : ''}" onclick="selectServer(${s.id})">
      <div class="dot" id="dot-${s.id}"></div>
      <div class="nav-item-info">
        <div class="nav-item-name">${esc(s.name)}</div>
        <div class="nav-item-url">${esc(shortenUrl(s.url))}</div>
      </div>
      <button onclick="event.stopPropagation();openEditModal(${s.id})" style="background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;font-size:12px;border-radius:2px;opacity:.6" title="Editar">✎</button>
    </button>
  `).join('');

  document.getElementById('activeCount').textContent = `${servers.length} servidor${servers.length !== 1 ? 'es' : ''}`;
}

function renderIframes() {
  // Remove iframes antigos não mais na lista
  document.querySelectorAll('.iframe-container').forEach(el => {
    const id = parseInt(el.dataset.id);
    if (!servers.find(s => s.id === id)) el.remove();
  });

  // Cria iframes para novos servidores
  servers.forEach(s => {
    if (!document.querySelector(`.iframe-container[data-id="${s.id}"]`)) {
      createIframeContainer(s);
    }
  });
}

function createIframeContainer(s) {
  const div = document.createElement('div');
  div.className = 'iframe-container';
  div.dataset.id = s.id;
  div.innerHTML = `
    <div class="iframe-topbar">
      <span class="iframe-topbar-name">${esc(s.name)}</span>
      <span class="iframe-topbar-url">${esc(s.url)}</span>
      <div class="iframe-topbar-actions">
        <button class="top-btn" onclick="reloadIframe(${s.id})" title="Recarregar">↺ Reload</button>
        <button class="top-btn" onclick="openExternal(${s.id})" title="Abrir em nova aba">↗ Abrir</button>
        <button class="top-btn danger" onclick="openEditModal(${s.id})">✎ Editar</button>
      </div>
    </div>
    <div style="position:relative;flex:1">
      <div class="iframe-loading" id="loading-${s.id}">
        <div class="loading-spinner"></div>
        <div class="loading-text">Conectando...</div>
      </div>
      <iframe
        id="iframe-${s.id}"
        src="${esc(s.url)}"
        allowfullscreen
        onload="iframeLoaded(${s.id})"
        onerror="iframeError(${s.id})"
        style="position:absolute;inset:0;width:100%;height:100%;border:none"
      ></iframe>
    </div>
  `;
  document.getElementById('contentArea').appendChild(div);
}

function selectServer(id) {
  activeId = id;

  // Mostra/esconde empty state
  document.getElementById('emptyState').style.display = 'none';

  // Ativa/desativa containers
  document.querySelectorAll('.iframe-container').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });

  renderNav();
}

function iframeLoaded(id) {
  const loading = document.getElementById(`loading-${id}`);
  if (loading) loading.classList.add('hidden');
  const dot = document.getElementById(`dot-${id}`);
  if (dot) dot.className = 'dot online';
}

function iframeError(id) {
  const dot = document.getElementById(`dot-${id}`);
  if (dot) dot.className = 'dot offline';
}

function reloadIframe(id) {
  const iframe = document.getElementById(`iframe-${id}`);
  const loading = document.getElementById(`loading-${id}`);
  if (loading) loading.classList.remove('hidden');
  if (iframe) {
    iframe.src = iframe.src;
    const dot = document.getElementById(`dot-${id}`);
    if (dot) dot.className = 'dot loading';
  }
}

function openExternal(id) {
  const s = servers.find(s => s.id === id);
  if (s) window.open(s.url, '_blank');
}

// MODAL
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Adicionar Servidor';
  document.getElementById('editName').value = '';
  document.getElementById('editUrl').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('editModal').classList.add('open');
}

function openEditModal(id) {
  const s = servers.find(s => s.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar Servidor';
  document.getElementById('editName').value = s.name;
  document.getElementById('editUrl').value = s.url;
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

function saveServer() {
  const name = document.getElementById('editName').value.trim();
  const url = document.getElementById('editUrl').value.trim();

  if (!name || !url) { alert('Preencha nome e URL!'); return; }

  const fullUrl = url.startsWith('http') ? url : 'https://' + url;

  if (editingId) {
    const s = servers.find(s => s.id === editingId);
    if (s) {
      s.name = name;
      s.url = fullUrl;
      // Atualiza iframe existente
      const iframe = document.getElementById(`iframe-${editingId}`);
      if (iframe) iframe.src = fullUrl;
      const container = document.querySelector(`.iframe-container[data-id="${editingId}"]`);
      if (container) {
        container.querySelector('.iframe-topbar-name').textContent = name;
        container.querySelector('.iframe-topbar-url').textContent = fullUrl;
      }
    }
  } else {
    const id = nextId++;
    servers.push({ id, name, url: fullUrl });
    renderIframes();
    selectServer(id);
  }

  saveServers();
  renderNav();
  closeModal();
}

function deleteServer() {
  if (!editingId) return;
  if (!confirm('Remover este servidor?')) return;

  servers = servers.filter(s => s.id !== editingId);
  const container = document.querySelector(`.iframe-container[data-id="${editingId}"]`);
  if (container) container.remove();

  if (activeId === editingId) {
    activeId = null;
    if (servers.length > 0) {
      selectServer(servers[0].id);
    } else {
      document.getElementById('emptyState').style.display = 'flex';
    }
  }

  saveServers();
  renderNav();
  closeModal();
}

// UTILS
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function shortenUrl(url) {
  return url.replace(/^https?:\/\//, '').split('/')[0];
}

// KEYBOARD: 1, 2, 3... para trocar de servidor
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= servers.length) selectServer(servers[n-1].id);
});

// INIT
loadServers();
renderNav();
renderIframes();

// Seleciona primeiro por padrão
if (servers.length > 0) selectServer(servers[0].id);
</script>
</body>
</html>
